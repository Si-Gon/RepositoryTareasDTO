# CONFIGURACIÓN DE LA APLICACIÓN
#
# CAMBIO vs tu versión:
# - Se eliminó toda la configuración de MySQL/JPA/Hibernate.
#   Ya no hay base de datos — usamos HashMap en memoria.
# - La propiedad spring.datasource.url tenía un error: usaba "spring.database.url"
#   en vez de "spring.datasource.url" (faltaba "source"), lo que causaría
#   que la app no conectara a MySQL aunque quisieras.
# - Configuración mucho más simple: solo nombre y puerto.

spring.application.name=tareas
server.port=8080

# Formato de fechas en JSON: las fechas LocalDate se serializarán como "2025-12-31"
spring.jackson.serialization.write-dates-as-timestamps=false
